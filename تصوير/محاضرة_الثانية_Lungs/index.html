
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اختبار MCQ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Cairo:wght@400;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation; }
        .quiz-container { background-color: #1e1e1e; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px 15px; max-width: 600px; margin: 0 auto; border-left: 1px solid #333; border-right: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #333; margin-bottom: 20px; flex-shrink: 0; }
        .q-count { color: #888; font-size: 0.9rem; font-weight: 500; }
        .subject-title { color: #00e676; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1.1rem; text-align: center;}
        .timer-box { background-color: #2c2c2c; color: #fff; padding: 6px 12px; border-radius: 4px; font-weight: bold; border: 1px solid #444; min-width: 70px; text-align: center; }
        .timer-box.warning { background-color: #4a1818; color: #ff6b6b; border-color: #ff6b6b; }
        .question-area { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .question-text { font-family: 'Roboto', sans-serif; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; color: #ffffff; text-align: left; line-height: 1.5; direction: ltr; word-break: break-word;}
        .options-list { list-style: none; padding: 0; }
        .option { background-color: #2c2c2c; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; font-size: 1rem; text-align: left; transition: background 0.2s; color: #ddd; display: flex; align-items: flex-start; gap: 10px; direction: ltr; }
        .option:active { background-color: #444; }
        .opt-letter { font-weight: bold; color: #2979ff; min-width: 25px; display: inline-block; }
        .opt-text { flex: 1; word-wrap: break-word; word-break: break-word; line-height: 1.4; }
        .option.correct { background-color: #1b5e20 !important; border-color: #00e676 !important; color: #fff; }
        .option.correct .opt-letter { color: #fff; }
        .option.wrong { background-color: #b71c1c !important; border-color: #ff1744 !important; color: #fff; }
        .option.wrong .opt-letter { color: #fff; }
        .disabled { pointer-events: none; }
        .navigation { margin-top: auto; display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #333; flex-shrink: 0; }
        button { background: #2979ff; color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;}
        button:disabled { background-color: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        .result-screen { display: none; text-align: center; height: 100%; overflow-y: auto; width: 100%;}
        .score-box { background: #2c2c2c; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .big-score { font-size: 3rem; font-weight: bold; color: #2979ff; display: block; }
        .review-section { text-align: left; margin-top: 10px; direction: ltr; }
        .review-item { background: #1e1e1e; border-bottom: 1px solid #333; padding: 15px 5px; }
        .review-q-text { font-family: 'Roboto', sans-serif; color: #fff; margin-bottom: 10px; font-size: 1rem; font-weight: bold; word-break: break-word;}
    </style>
</head>
<body>
<div class="quiz-container">
    <div id="quiz-screen" style="display:flex; flex-direction:column; height:100%;">
        <div class="header" id="main-header">
            <span class="q-count" id="q-progress"></span>

            
            <div id="titles-container" style="display:flex; flex-direction:column; align-items:center;">
                <span class="subject-title" style="color:#2979ff; font-family:'Cairo'; font-size:1.2rem;">📄 اختبار MCQ</span>
            </div>
            

            <div class="timer-box" id="timer-box"><span id="timer">60</span>s</div>
        </div>
        <div class="question-area" id="main-q-area">
            <div class="question-text" id="question-text"></div>
            <ul class="options-list" id="options-list"></ul>
        </div>
        <div class="navigation" id="main-nav">
            <button id="prev-btn" onclick="prevQuestion()" disabled>Prev</button>
            <button id="next-btn" onclick="nextQuestion()">Next</button>
        </div>

        

    </div>
    <div id="result-screen" class="result-screen">
        <h2 style="color: #fff; margin-top:0;">Quiz Results</h2>
        <div class="score-box">
            <span class="big-score" id="score-text">0%</span>
            <p id="score-detail" style="color:#aaa; margin:5px 0 0;">0 / 0 Correct</p>
        </div>
        <div class="review-section" id="review-list"></div>
        <div style="padding: 20px 0;">

            

            <button onclick="restartQuiz()" style="width:100%; background:#00c853;">Restart</button>
        </div>
    </div>
</div>
<script>
    const questions = [{"answer": 1, "options": ["To measure the precise volume of the thoracic cavity", "To evaluate primary lung disease and pulmonary effects of diseases in other organ systems", "To assess the bone mineral density of the thoracic spine", "To visualize the coronary arteries of the heart"], "question": "What is the primary purpose of performing a radiographic examination of the lungs?"}, {"answer": 2, "options": ["The size of the image receptor available", "The preference of the radiographer", "The condition of the patient", "The time of day the exam is performed"], "question": "When deciding on the positioning for a chest radiograph, what primarily governs the choice between an erect or decubitus technique?"}, {"answer": 1, "options": ["It compresses the abdominal organs to increase lung density", "The gravity effect on the abdominal organs allows for the revelation of a maximum area of lung tissue", "It pushes the diaphragm upwards to shrink the lung fields", "It aligns the stomach with the lower lobes"], "question": "In lung radiography, what is one of the main advantages of positioning the patient erect regarding the abdominal organs?"}, {"answer": 0, "options": ["Fluid levels are defined more easily with the use of a horizontal central ray", "Fluid dissipates faster when the patient is standing", "The erect position increases the density of the fluid", "A vertical central ray can be used more effectively"], "question": "Why is the erect position preferred for visualizing fluid levels in a chest radiograph?"}, {"answer": 2, "options": ["Because the patient is more comfortable lying down", "To artificially magnify the heart for better visualization", "Because the arms can be arranged more easily to enable the scapulae to be projected clear of the lung fields", "To increase the radiation dose to the breast tissue for better contrast"], "question": "Why is the postero-anterior (PA) projection generally adopted in preference to the antero-posterior (AP) projection for routine chest radiography?"}, {"answer": 1, "options": ["Heart magnification is significantly increased", "Heart magnification is significantly reduced", "The heart appears inverted", "The heart shadow is completely obscured"], "question": "How does the postero-anterior (PA) projection of the chest affect the radiographic appearance of the heart compared to the AP projection?"}, {"answer": 1, "options": ["It eliminates the need for gonadal shielding", "It facilitates compression of breast tissue with an associated reduction in dose to the breast tissue", "It requires a lower kilovoltage (kVp) setting", "It reduces the dose to the cervical spine"], "question": "What is a specific radiation protection advantage of using the postero-anterior (PA) projection over the AP projection for chest radiography?"}, {"answer": 2, "options": ["Normal quiet breathing", "Arrested deep expiration", "Arrested deep inspiration", "During continuous phonation"], "question": "During a standard radiographic examination of the lungs, at what phase of respiration are images normally acquired?"}, {"answer": 1, "options": ["To lower the patient\u0027s heart rate", "To ensure maximum visualization of the air-filled lungs", "To blur out the ribs and improve lung parenchyma visibility", "To compress the superior vena cava"], "question": "What is the primary reason for acquiring lung radiographs on arrested deep inspiration?"}, {"answer": 2, "options": ["The trachea", "The lung apices", "The mediastinum", "The diaphragm"], "question": "When interpreting an antero-posterior (AP) chest radiograph, what structure appears artificially widened, potentially causing diagnostic difficulty?"}, {"answer": 2, "options": ["The ribs are not visible in an AP view", "The lung bases are completely cut off", "Magnification makes heart size and apical regions difficult to assess, and the mediastinum appears artificially widened", "The clavicles always obscure the entire upper lobes"], "question": "Why is an antero-posterior (AP) chest radiograph considered difficult to assess when trauma is suspected?"}, {"answer": 1, "options": ["It enhances the visibility of fine interstitial changes", "It reduces visibility of lung parenchymal detail, masking vascular changes and reducing the conspicuity of consolidation", "It makes the lungs appear completely radiopaque (white)", "It only affects the appearance of the bony thorax"], "question": "In chest radiography, what is the consequence of an overexposed image on the visualization of lung parenchyma?"}, {"answer": 0, "options": ["Normal lung markings can be artificially enhanced and wrongly interpreted as disease (e.g., pulmonary fibrosis or oedema)", "Small pneumothoraces become dramatically exaggerated", "The heart shadow disappears entirely", "The ribs will appear fractured"], "question": "What severe diagnostic error can result from an underexposed chest radiograph?"}, {"answer": 1, "options": ["It makes the central areas excessively radiolucent", "It obscures the central areas, causing a failure to diagnose abnormalities of the mediastinum", "It highlights the central airways excessively", "It causes artifacts that mimic foreign bodies in the trachea"], "question": "How does underexposure of a chest radiograph affect the central areas of the thorax?"}, {"answer": 1, "options": ["The umbilicus", "The normal nipple", "The axillary lymph nodes", "The sternocleidomastoid muscle"], "question": "When evaluating soft-tissue artifacts on a chest radiograph, what is one of the most common normal anatomical structures that causes confusion with lung lesions?"}, {"answer": 1, "options": ["Excessive body hair", "Skin folds and creases", "Dry skin", "Prominent superficial veins"], "question": "In thin or elderly patients undergoing chest radiography, what external factor can cause linear artifacts that might mimic pathology?"}, {"answer": 1, "options": ["Due to the presence of the liver under the left diaphragm", "Due to the inclination of the heart to the left side", "Because the right main bronchus is smaller", "Because the left lung has three lobes"], "question": "In the radiographic anatomy of the thorax, why is the right lung larger than the left lung?"}, {"answer": 1, "options": ["Right into upper and lower; Left into upper, middle, and lower", "Right into upper, middle, and lower; Left into upper and lower", "Both are divided into upper, middle, and lower lobes", "Both are divided into only upper and lower lobes"], "question": "According to normal radiographic anatomy, how are the right and left lungs divided into lobes?"}, {"answer": 2, "options": ["When the patient is in the supine position", "When the patient is holding their breath on expiration", "When the plane of each fissure is parallel to the X-ray beam", "Only when contrast media is injected"], "question": "Under what specific condition can the fissures separating the lung lobes be demonstrated on a radiograph of the thorax?"}, {"answer": 1, "options": ["2nd thoracic vertebra (T2)", "4th thoracic vertebra (T4)", "7th thoracic vertebra (T7)", "10th thoracic vertebra (T10)"], "question": "At what anatomical level does the trachea normally divide into the right and left main bronchi in an adult thorax?"}, {"answer": 1, "options": ["The right main bronchus is narrower, longer, and more horizontal", "The right main bronchus is wider, shorter, and more vertical", "The left main bronchus has a sharper angle", "The right lung has a stronger inspiratory vacuum"], "question": "Anatomically, why are inhaled foreign bodies more likely to pass into the right bronchial tree than the left?"}, {"answer": 1, "options": ["The lymph nodes and thymus gland", "The main branches of the pulmonary arteries and veins", "The cartilage rings of the main bronchi", "The muscular layers of the esophagus"], "question": "On a normal chest radiograph, what anatomical structures primarily form the hilar regions (regions of increased radio-opacity)?"}, {"answer": 2, "options": ["Due to the presence of the stomach on the right", "Because the right lung is heavier", "Mainly due to the presence of the liver on the right and the heart on the left", "Due to the pull of the superior vena cava"], "question": "Why does the right dome of the diaphragm normally lie higher than the left dome on a chest radiograph?"}, {"answer": 1, "options": ["Tucked into the chest", "Extended and centred to the middle of the top of the receptor", "Turned completely to the right side", "Positioned resting on the shoulders"], "question": "When positioning a patient for a postero-anterior (PA) erect chest radiograph, how should the patient\u0027s chin be adjusted?"}, {"answer": 2, "options": ["Elevated towards the ears", "Rotated backward and lifted up", "Rotated forward and pressed downward in contact with the receptor", "Kept in a natural, relaxed, neutral posture"], "question": "For a standard PA erect chest radiograph, what specific instruction is given regarding the patient\u0027s shoulders?"}, {"answer": 1, "options": ["To keep the patient\u0027s hands warm", "To achieve the forward rotation of the shoulders and clear the scapulae from the lung fields", "To force the patient into deep expiration", "To immobilize the lower spine"], "question": "During the setup for a PA erect chest radiograph, what is the purpose of placing the dorsal aspect of the hands behind and below the hips with the elbows brought forward?"}, {"answer": 1, "options": ["At the level of the 4th thoracic vertebra", "At the level of the 8th thoracic vertebrae (coincident with the lung midpoint)", "At the level of the sternal angle", "At the level of the 12th thoracic vertebra"], "question": "Where should the collimated horizontal X-ray beam be centered for a standard PA erect chest radiograph?"}, {"answer": 2, "options": ["The jugular notch", "The xiphoid process", "The inferior angle of the scapula before the shoulders are pushed forward", "The superior border of the clavicle"], "question": "What palpable surface marking can be used to assess the level of the T7 spinous process for centering a PA chest radiograph?"}, {"answer": 1, "options": ["Superimposed over the upper lobes", "Laterally away from the lung fields", "Medially over the hilum", "Obscuring the costophrenic angles"], "question": "According to the essential image characteristics, where should the scapulae be projected on an ideal PA chest radiograph?"}, {"answer": 2, "options": ["The ribs appear perfectly horizontal", "The heart shadow is entirely on the left side", "The medial ends of the clavicles should overlap the transverse processes of the spine", "The trachea is perfectly straight with no deviation at all"], "question": "How is the absence of patient rotation confirmed on a diagnostic PA chest radiograph?"}, {"answer": 1, "options": ["The gastric bubble only", "The inferior to the costophrenic angles and the diaphragm", "The lower pole of the kidneys", "The 12th ribs entirely"], "question": "What anatomical structures must be clearly outlined at the inferior aspect of an ideal PA chest radiograph?"}, {"answer": 1, "options": ["The arms should be raised straight up above the head", "The arms should be allowed to encircle the vertical Bucky", "The arms should be crossed tightly over the chest", "The arms should hang loosely at the sides"], "question": "If a patient is unable to adopt the basic arm position (hands behind hips) for a PA chest radiograph, what alternative positioning should be used to manage the scapulae?"}, {"answer": 1, "options": ["The heart will appear radiolucent", "The heart will not be central, making assessment of heart size impossible", "The heart valves will become calcified", "The aortic arch will disappear"], "question": "What is a significant consequence of patient rotation on a PA chest radiograph regarding cardiac assessment?"}, {"answer": 2, "options": ["Ensure the bottle is placed on the patient\u0027s lap", "Disconnect the tube briefly during exposure", "Ensure chest tubes are not dislodged, and the bottle is not raised above the level of the chest", "Clamp the chest tube prior to the patient taking a breath"], "question": "When performing a chest radiograph on a patient with an underwater-seal chest drain bottle, what critical precaution must be taken?"}, {"answer": 2, "options": ["To measure the exact dimensions of the image receptor", "To calculate the radiation dose received", "Care should be made not to misdiagnose a case of dextrocardia", "To identify the brand of the X-ray machine used"], "question": "Why is the accurate use of an identification marker (PA side marker) crucial when performing a PA chest radiograph?"}];
    const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
    let currentQuestionIndex = 0; let score = 0; let userAnswers = new Array(questions.length).fill(null); let timeLeft = 60; let timerInterval;
    function startTimer() { timeLeft = 60; document.getElementById('timer').innerText = timeLeft; document.getElementById('timer-box').classList.remove('warning'); clearInterval(timerInterval); timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if (timeLeft <= 10) document.getElementById('timer-box').classList.add('warning'); if (timeLeft === 0) { clearInterval(timerInterval); handleTimeUp(); } }, 1000); }
    function handleTimeUp() { userAnswers[currentQuestionIndex] = -1; const options = document.getElementById('options-list').children; for (let i = 0; i < options.length; i++) { options[i].classList.add('disabled'); options[i].style.opacity = "0.5"; } nextQuestion(); }
    function loadQuestion() {
        if(questions.length === 0) { document.getElementById('main-q-area').innerHTML = `<div style="text-align:center; color:#888; margin-top:50px;"><h2 style="color:#2979ff;">المحاضرة فارغة 📭</h2><p style="margin-top:10px; font-family:'Cairo'; line-height: 1.6;">لم يتم إضافة أي أسئلة بعد.</p></div>`; document.getElementById('main-nav').style.display = 'none'; document.getElementById('timer-box').style.display = 'none'; document.getElementById('q-progress').innerText = "0 / 0"; return; }
        const currentQuestion = questions[currentQuestionIndex]; const qText = currentQuestion.question.replace(/^\d+[\.\-]\s*/, ''); document.getElementById('question-text').innerText = (currentQuestionIndex + 1) + ". " + qText; document.getElementById('q-progress').innerText = `${currentQuestionIndex + 1} / ${questions.length}`; const optionsList = document.getElementById('options-list'); optionsList.innerHTML = ''; const isAnswered = userAnswers[currentQuestionIndex] !== null;
        currentQuestion.options.forEach((option, index) => { const li = document.createElement('li'); li.classList.add('option'); const letter = letters[index] || ''; li.innerHTML = `<span class="opt-letter">${letter}</span> <span class="opt-text">${option}</span>`; if (isAnswered) { li.classList.add('disabled'); if (index === currentQuestion.answer) li.classList.add('correct'); if (index === userAnswers[currentQuestionIndex] && index !== currentQuestion.answer) li.classList.add('wrong'); } else { li.onclick = () => selectOption(index, li); } optionsList.appendChild(li); });
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0; document.getElementById('next-btn').innerText = currentQuestionIndex === questions.length - 1 ? "Finish" : "Next"; if (!isAnswered) startTimer(); else { clearInterval(timerInterval); document.getElementById('timer').innerText = "-"; }
    }
    function selectOption(selectedIndex, element) { clearInterval(timerInterval); userAnswers[currentQuestionIndex] = selectedIndex; const currentQuestion = questions[currentQuestionIndex]; const options = document.getElementById('options-list').children; for (let i = 0; i < options.length; i++) options[i].classList.add('disabled'); if (selectedIndex === currentQuestion.answer) { element.classList.add('correct'); } else { element.classList.add('wrong'); setTimeout(() => { options[currentQuestion.answer].classList.add('correct'); }, 1000); } }
    function nextQuestion() { if (currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; loadQuestion(); } else { showResults(); } }
    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); } }
    function showResults() { clearInterval(timerInterval); document.getElementById('quiz-screen').style.display = 'none'; document.getElementById('result-screen').style.display = 'block'; score = 0; const reviewList = document.getElementById('review-list'); reviewList.innerHTML = ''; questions.forEach((q, index) => { const userAnswer = userAnswers[index]; if (userAnswer === q.answer) score++; const reviewItem = document.createElement('div'); reviewItem.classList.add('review-item'); const qText = q.question.replace(/^\d+[\.\-]\s*/, ''); let optionsHtml = ''; q.options.forEach((opt, optIndex) => { let style = 'padding:10px; margin-bottom:5px; border-radius:4px; font-family:Roboto; display:flex; gap:10px; text-align:left;'; let letterStyle = 'font-weight:bold; min-width:20px;'; if (optIndex === q.answer) style += 'background: #1b5e20; border: 1px solid #00e676; color:white;'; else if (optIndex === userAnswer && userAnswer !== q.answer) style += 'background: #b71c1c; border: 1px solid #ff1744; color:white;'; else style += 'background: #2c2c2c; color:#888; border: 1px solid #444;'; optionsHtml += `<div style="${style}"><span style="${letterStyle}">${letters[optIndex]}</span><span style="flex:1; word-wrap:break-word;">${opt}</span></div>`; }); reviewItem.innerHTML = `<div class="review-q-text">${index + 1}. ${qText}</div><div style="direction: ltr;">${optionsHtml}</div>`; reviewList.appendChild(reviewItem); }); const percentage = Math.round((score / questions.length) * 100); document.getElementById('score-text').innerText = percentage + "%"; document.getElementById('score-detail').innerText = `${score} / ${questions.length} Correct`; }
    function restartQuiz() { currentQuestionIndex = 0; score = 0; userAnswers = new Array(questions.length).fill(null); document.getElementById('quiz-screen').style.display = 'flex'; document.getElementById('result-screen').style.display = 'none'; loadQuestion(); }
    loadQuestion();
</script>
</body>
</html>
