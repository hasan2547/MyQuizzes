 scanner.", "trans": "ملفات التدرج هي حلقات من الأسلاك أو صفائح رفيعة موصلة على غلاف أسطواني تقع داخل تجويف ماسح الرنين المغناطيسي مباشرةً.", "isTitle": false, "isSubTitle": false}, {"text": "When current is passed through these coils a secondary magnetic field is created.", "trans": "عندما يمر تيار كهربائي عبر هذه الملفات، يتكون مجال مغناطيسي ثانوي.", "isTitle": false, "isSubTitle": false}, {"text": "Spatial Encoding", "trans": "الترميز المكاني", "isTitle": false, "isSubTitle": false}, {"text": "Three sets of gradients are used along z, y and x axis and they are named as", "trans": "تُستخدم ثلاث مجموعات من التدرجات على طول المحاور z و y و x وتُسمى كالتالي:", "isTitle": false, "isSubTitle": false}, {"text": "Slice Selection Gradient (SSG)", "trans": "تدرج اختيار الشريحة (SSG)", "isTitle": false, "isSubTitle": false}, {"text": "Phase Encoding Gradient (PEG)", "trans": "تدرج ترميز الطور (PEG)", "isTitle": false, "isSubTitle": false}, {"text": "Frequency Encoding Gradient (FEG)", "trans": "تدرج ترميز التردد (FEG)", "isTitle": false, "isSubTitle": false}, {"text": "Slice Selection Gradient (SSG)", "trans": "تدرج اختيار الشريحة (SSG)", "isTitle": false, "isSubTitle": false}, {"text": "MR image is made up of a series of parallel slices, which are imaged in turn.", "trans": "تتكون صورة الرنين المغناطيسي من سلسلة من الشرائح المتوازية، والتي يتم تصويرها بالتتابع.", "isTitle": false, "isSubTitle": false}, {"text": "Along with a 90° pulse, the pair of Z-coil is energized with a DC supply .", "trans": "جنبًا إلى جنب مع نبضة 90 درجة، يتم تنشيط زوج ملفات Z بإمداد تيار مستمر.", "isTitle": false, "isSubTitle": false}, {"text": "This produces a controlled magnetic field gradient along a z-axis.", "trans": "هذا ينتج تدرجًا مغناطيسيًا متحكمًا به على طول المحور z.", "isTitle": false, "isSubTitle": false}, {"text": "The total magnetic field increases at the head side and decreases at the toe side, Protons at precess at the toe side slowly, and are faster at the head side,", "trans": "يز         let currentIndex = 0;

        function renderPage() {
            const container = document.getElementById('contentArea');
            if(!pages || pages.length === 0) {
                container.innerHTML = "<h3 style='text-align:center; font-family:Cairo;'>عذراً، لا توجد بيانات لعرضها.</h3>";
                return;
            }
            const data = pages[currentIndex];
            
            document.getElementById('pageIndicator').innerText = `${currentIndex + 1} / ${pages.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === (pages.length - 1);

            let html = '';
            
            data.content.forEach((item, idx) => {
                if (item.type === 'image') {
                    html += `<div class="lecture-image-container"><img src="${item.src}" alt="Slide Image" class="lecture-image"></div>`;
                } else {
                    let cssClass = "english-paragraph";
                    if (item.isTitle) cssClass = "title-text";
                    if (item.isSubTitle) cssClass = "sub-title";

                    const lines = (item.text || "").split('\n');
                    let formattedBlock = '';
                    
                    lines.forEach(line => {
                        const words = line.split(' ');
                        let interactiveText = '';
                        words.forEach(word => {
                            const cleanWordForLookup = word.replace(/[.,()?!:;“”"°\[\]*\-0-9]/g, '').toLowerCase();
                            if (cleanWordForLookup && /[a-z]/i.test(cleanWordForLookup)) {
                                interactiveText += `<span class="interactive-word" onclick="showWordMeaning('${cleanWordForLookup}', '${word.replace(/'/g, "\'")}')">${word}</span> `;
                            } else {
                                interactiveText += `${word} `; 
                            }
                        });
                        formattedBlock += `<div>${interactiveText}</div>`;
                    });

                    let transFormatted = (item.trans || "").replace(/\n/g, '<br>');

                    html += `
                        <div class="text-block">
                            <div class="${cssClass}">${formattedBlock}</div>
                            <button class="toggle-trans-btn" onclick="toggleTranslation('trans-${idx}')">إظهار الترجمة &#11015;</button>
                            <div id="trans-${idx}" class="inline-translation">${transFormatted}</div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
            window.scrollTo(0,0);
        }

        function toggleTranslation(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        let currentWordForAudio = "";
        function showWordMeaning(cleanWord, originalWord) {
            const translation = dictionary[cleanWord] || "غير متوفرة بالقاموس حالياً"; 
            currentWordForAudio = originalWord.replace(/[.,()?!:;“”"°\[\]*|]/g, '');

            document.getElementById('swEnglish').innerText = currentWordForAudio; 
            document.getElementById('swArabic').innerText = translation;
            document.getElementById('sheetOverlay').classList.add('active');
        }

        function playAudio() {
            if (currentWordForAudio) {
                const utterance = new SpeechSynthesisUtterance(currentWordForAudio);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function closeSheet(e) {
            if (!e || e.target.id === 'sheetOverlay') {
                document.getElementById('sheetOverlay').classList.remove('active');
            }
        }

        function changePage(dir) {
            currentIndex += dir;
            renderPage();
        }

        window.onload = function() { renderPage(); };
    </script>
