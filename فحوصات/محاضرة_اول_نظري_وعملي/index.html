
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اختبار MCQ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Cairo:wght@400;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        body { font-family: 'Roboto', sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation; }
        .quiz-container { background-color: #1e1e1e; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px 15px; max-width: 600px; margin: 0 auto; border-left: 1px solid #333; border-right: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #333; margin-bottom: 20px; flex-shrink: 0; }
        .q-count { color: #888; font-size: 0.9rem; font-weight: 500; }
        .subject-title { color: #00e676; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 1.1rem; text-align: center;}
        .timer-box { background-color: #2c2c2c; color: #fff; padding: 6px 12px; border-radius: 4px; font-weight: bold; border: 1px solid #444; min-width: 70px; text-align: center; }
        .timer-box.warning { background-color: #4a1818; color: #ff6b6b; border-color: #ff6b6b; }
        .question-area { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .question-text { font-family: 'Roboto', sans-serif; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; color: #ffffff; text-align: left; line-height: 1.5; direction: ltr; word-break: break-word;}
        .options-list { list-style: none; padding: 0; }
        .option { background-color: #2c2c2c; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; font-size: 1rem; text-align: left; transition: background 0.2s; color: #ddd; display: flex; align-items: flex-start; gap: 10px; direction: ltr; }
        .option:active { background-color: #444; }
        .opt-letter { font-weight: bold; color: #2979ff; min-width: 25px; display: inline-block; }
        .opt-text { flex: 1; word-wrap: break-word; word-break: break-word; line-height: 1.4; }
        .option.correct { background-color: #1b5e20 !important; border-color: #00e676 !important; color: #fff; }
        .option.correct .opt-letter { color: #fff; }
        .option.wrong { background-color: #b71c1c !important; border-color: #ff1744 !important; color: #fff; }
        .option.wrong .opt-letter { color: #fff; }
        .disabled { pointer-events: none; }
        .navigation { margin-top: auto; display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #333; flex-shrink: 0; }
        button { background: #2979ff; color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;}
        button:disabled { background-color: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        .result-screen { display: none; text-align: center; height: 100%; overflow-y: auto; width: 100%;}
        .score-box { background: #2c2c2c; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .big-score { font-size: 3rem; font-weight: bold; color: #2979ff; display: block; }
        .review-section { text-align: left; margin-top: 10px; direction: ltr; }
        .review-item { background: #1e1e1e; border-bottom: 1px solid #333; padding: 15px 5px; }
        .review-q-text { font-family: 'Roboto', sans-serif; color: #fff; margin-bottom: 10px; font-size: 1rem; font-weight: bold; word-break: break-word;}
    </style>
</head>
<body>
<div class="quiz-container">
    <div id="quiz-screen" style="display:flex; flex-direction:column; height:100%;">
        <div class="header" id="main-header">
            <span class="q-count" id="q-progress"></span>
            
            
            <div id="titles-container" style="display:flex; flex-direction:column; align-items:center;">
                <span class="subject-title" style="color:#2979ff; font-family:'Cairo'; font-size:1.2rem;">📄 اختبار MCQ</span>
            </div>
            
            
            <div class="timer-box" id="timer-box"><span id="timer">30</span>s</div>
        </div>
        <div class="question-area" id="main-q-area">
            <div class="question-text" id="question-text"></div>
            <ul class="options-list" id="options-list"></ul>
        </div>
        <div class="navigation" id="main-nav">
            <button id="prev-btn" onclick="prevQuestion()" disabled>Prev</button>
            <button id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
        
        
        
    </div>
    <div id="result-screen" class="result-screen">
        <h2 style="color: #fff; margin-top:0;">Quiz Results</h2>
        <div class="score-box">
            <span class="big-score" id="score-text">0%</span>
            <p id="score-detail" style="color:#aaa; margin:5px 0 0;">0 / 0 Correct</p>
        </div>
        <div class="review-section" id="review-list"></div>
        <div style="padding: 20px 0;">
        
            
            
            <button onclick="restartQuiz()" style="width:100%; background:#00c853;">Restart</button>
        </div>
    </div>
</div>
<script>
    const questions = [{"answer": 1, "options": ["Magnetic Resonance Imaging (MRI)", "Computed Tomography (CT)", "Angiography", "Radionuclide imaging"], "question": "Which of the following imaging modalities is considered the technique of choice and the first line for investigating serious head injuries, acute stroke, and other neurological emergencies?"}, {"answer": 2, "options": ["Diagnosing multiple sclerosis", "Evaluating cognitive function", "Cases of head injury", "Assessing intracerebral arterial velocity"], "question": "Despite being of little general value for brain imaging, in which specific scenario do plain films (X-rays) still hold some clinical utility?"}, {"answer": 1, "options": ["Diagnosing chronic neurological diseases", "Preoperative assessment of tumours", "Monitoring brain function during cognitive tasks", "First-line investigation of suspected infection"], "question": "For which of the following is angiography still frequently requested, despite the rise of cross-sectional imaging?"}, {"answer": 0, "options": ["Interventional radiological techniques", "Nuclear medicine cognitive mapping", "Neonatal trans-fontanelle evaluations", "Routine stroke screening"], "question": "Expertise in angiography is considered vital for the practice of which specific medical field within the nervous system?"}, {"answer": 2, "options": ["It is less effective diagnostically than CT.", "It relies heavily on ionizing radiation.", "It is constrained by logistics, patient acceptability, and safety of patient handling.", "It cannot detect subarachnoid haemorrhages under any circumstances."], "question": "What is the primary limitation that prevents MRI from being the absolute first-line choice in acute emergency situations, despite being the best and most versatile imaging modality?"}, {"answer": 1, "options": ["Neonatal hydrocephalus", "Subarachnoid haemorrhage, acute stroke, and aneurysms", "Superficial skull bone fractures", "Radionuclide flow anomalies"], "question": "Thanks to new protocols, MRI has seen a significantly raised sensitivity in the detection of which of the following conditions?"}, {"answer": 3, "options": ["Computed Tomography (CT)", "Transcranial Doppler Ultrasound", "Single Photon Emission Computed Tomography (SPECT)", "Magnetic Resonance Imaging (MRI)"], "question": "Which imaging modality is the ONLY effective way of diagnosing multiple sclerosis, the most common chronic neurological disease?"}, {"answer": 1, "options": ["Radionuclide imaging; to examine the structure of the skull.", "Radionuclide imaging; to examine the function of the brain.", "Cross-sectional imaging; to evaluate ventricular volume.", "Hemodynamic imaging; to measure major arterial velocity."], "question": "PET and SPECT fall under which category of imaging, and what is their primary purpose?"}, {"answer": 1, "options": ["By sending high-frequency sound waves through the fontanelles.", "By monitoring the flow of injected radioactive substances while the client performs instructed cognitive activities.", "By measuring the magnetic resonance of hydrogen atoms in the brain tissue.", "By observing the attenuation of X-rays passing through the cerebral cortex."], "question": "During a PET or SPECT scan, how does the operator monitor brain function?"}, {"answer": 1, "options": ["PET uses a single photon, while SPECT uses two photons simultaneously.", "PET uses two photons simultaneously, while SPECT uses a single photon.", "PET does not involve radioactive substances, whereas SPECT does.", "PET is utilized solely for anatomical mapping, while SPECT is functional."], "question": "From a physical standpoint, what distinguishes Positron Emission Tomography (PET) from Single Photon Emission Computed Tomography (SPECT)?"}, {"answer": 2, "options": ["SPECT provides better resolution with sharper and clearer pictures.", "Both modalities offer the exact same resolution and image clarity.", "PET provides better resolution with sharper and clearer pictures.", "MRI provides better functional resolution than both PET and SPECT combined."], "question": "When comparing the image quality of PET and SPECT, which statement is accurate?"}, {"answer": 2, "options": ["30 to 60 minutes", "1 to 2 hours", "2 to 3 hours", "4 to 5 hours"], "question": "Approximately how long does a standard PET scan take to complete?"}, {"answer": 1, "options": ["Less than 30 minutes", "1 to 2 hours", "2 to 3 hours", "Over 3 hours"], "question": "What is the typical duration for completing a SPECT scan?"}, {"answer": 1, "options": ["Their brains contain more water, enhancing sound wave reflection.", "The presence of fontanelles allows sound waves to penetrate the skull.", "Ultrasound is the only way to detect multiple sclerosis in infants.", "They can be easily sedated for the duration of the scan."], "question": "In neonates and infants during their first year of life, what makes Ultrasound (US) a viable and valuable imaging technique for the brain?"}, {"answer": 2, "options": ["Studying cognitive brain function", "Diagnosing chronic neurological diseases", "Studying haemorrhagic and ischaemic syndromes, developmental malformations, and hydrocephalus", "Preoperative assessment of solid brain tumours"], "question": "Which of the following is a primary indication for using cranial ultrasound in infants?"}, {"answer": 1, "options": ["Via trans-fontanelle imaging to detect tumours.", "Using transcranial Doppler for intracerebral arterial velocity studies.", "To diagnose acute multiple sclerosis relapses.", "To map functional cognitive activity during operator-instructed tasks."], "question": "How is Ultrasound utilized for brain assessment in adult patients?"}, {"answer": 2, "options": ["Epidural haemorrhage", "Subdural haemorrhage", "Subarachnoid haemorrhage", "Intraventricular haemorrhage"], "question": "Angiography is still considered an important tool for investigating which specific type of intracranial haemorrhage?"}, {"answer": 0, "options": ["It is much easier and safer to use in emergency situations.", "It has no contraindications for pregnant patients.", "It provides superior functional cognitive data.", "It relies on a single photon emission."], "question": "Why is CT considered more practical than MRI in an acute emergency setting?"}, {"answer": 2, "options": ["Plain films", "Computed Tomography (CT)", "Magnetic Resonance Imaging (MRI)", "Ultrasound (US)"], "question": "Which modality provides the best and most versatile imaging for the brain, assuming availability and safety logistics are not an issue?"}, {"answer": 3, "options": ["Transcranial Doppler", "Non-contrast CT", "Plain X-ray", "PET and SPECT"], "question": "Which technique requires radioactive substances to be injected directly into the blood?"}, {"answer": 2, "options": ["Ultrasound", "Plain X-ray", "Computed Tomography (CT)", "SPECT"], "question": "A patient arrives at the emergency department with a suspected brain infection. Which imaging technique is the generally accepted choice in most centres for this acute presentation?"}, {"answer": 0, "options": ["MRI", "CT", "Plain X-ray", "SPECT"], "question": "If a physician needs to evaluate a patient for a suspected aneurysm, which modality\u0027s sensitivity has recently been raised by new protocols to aid in this detection?"}, {"answer": 2, "options": ["Computed Tomography (CT)", "Single Photon Emission Computed Tomography (SPECT)", "Positron Emission Tomography (PET)", "Transcranial Doppler Ultrasound"], "question": "Which functional imaging modality requires the longest patient examination time?"}, {"answer": 2, "options": ["PET scanning", "MRI interpretation", "Angiography", "Ultrasound manipulation"], "question": "In the context of interventional radiology in the nervous system, which imaging technique\u0027s expertise is described as \"vital\"?"}, {"answer": 1, "options": ["Plain films", "Computed Tomography (CT)", "Ultrasound for adults", "SPECT"], "question": "Which imaging modality is explicitly described as being \"diagnostically highly effective\"?"}];
    const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H']; 
    let currentQuestionIndex = 0; let score = 0; let userAnswers = new Array(questions.length).fill(null); let timeLeft = 30; let timerInterval;
    function startTimer() { timeLeft = 30; document.getElementById('timer').innerText = timeLeft; document.getElementById('timer-box').classList.remove('warning'); clearInterval(timerInterval); timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft; if (timeLeft <= 10) document.getElementById('timer-box').classList.add('warning'); if (timeLeft === 0) { clearInterval(timerInterval); handleTimeUp(); } }, 1000); }
    function handleTimeUp() { userAnswers[currentQuestionIndex] = -1; const options = document.getElementById('options-list').children; for (let i = 0; i < options.length; i++) { options[i].classList.add('disabled'); options[i].style.opacity = "0.5"; } nextQuestion(); }
    function loadQuestion() {
        if(questions.length === 0) { document.getElementById('main-q-area').innerHTML = `<div style="text-align:center; color:#888; margin-top:50px;"><h2 style="color:#2979ff;">المحاضرة فارغة 📭</h2><p style="margin-top:10px; font-family:'Cairo'; line-height: 1.6;">لم يتم إضافة أي أسئلة بعد.</p></div>`; document.getElementById('main-nav').style.display = 'none'; document.getElementById('timer-box').style.display = 'none'; document.getElementById('q-progress').innerText = "0 / 0"; return; }
        const currentQuestion = questions[currentQuestionIndex]; const qText = currentQuestion.question.replace(/^\d+[\.\-]\s*/, ''); document.getElementById('question-text').innerText = (currentQuestionIndex + 1) + ". " + qText; document.getElementById('q-progress').innerText = `${currentQuestionIndex + 1} / ${questions.length}`; const optionsList = document.getElementById('options-list'); optionsList.innerHTML = ''; const isAnswered = userAnswers[currentQuestionIndex] !== null;
        currentQuestion.options.forEach((option, index) => { const li = document.createElement('li'); li.classList.add('option'); const letter = letters[index] || ''; li.innerHTML = `<span class="opt-letter">${letter}</span> <span class="opt-text">${option}</span>`; if (isAnswered) { li.classList.add('disabled'); if (index === currentQuestion.answer) li.classList.add('correct'); if (index === userAnswers[currentQuestionIndex] && index !== currentQuestion.answer) li.classList.add('wrong'); } else { li.onclick = () => selectOption(index, li); } optionsList.appendChild(li); });
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0; document.getElementById('next-btn').innerText = currentQuestionIndex === questions.length - 1 ? "Finish" : "Next"; if (!isAnswered) startTimer(); else { clearInterval(timerInterval); document.getElementById('timer').innerText = "-"; }
    }
    function selectOption(selectedIndex, element) { clearInterval(timerInterval); userAnswers[currentQuestionIndex] = selectedIndex; const currentQuestion = questions[currentQuestionIndex]; const options = document.getElementById('options-list').children; for (let i = 0; i < options.length; i++) options[i].classList.add('disabled'); if (selectedIndex === currentQuestion.answer) { element.classList.add('correct'); } else { element.classList.add('wrong'); setTimeout(() => { options[currentQuestion.answer].classList.add('correct'); }, 1000); } }
    function nextQuestion() { if (currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; loadQuestion(); } else { showResults(); } }
    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); } }
    function showResults() { clearInterval(timerInterval); document.getElementById('quiz-screen').style.display = 'none'; document.getElementById('result-screen').style.display = 'block'; score = 0; const reviewList = document.getElementById('review-list'); reviewList.innerHTML = ''; questions.forEach((q, index) => { const userAnswer = userAnswers[index]; if (userAnswer === q.answer) score++; const reviewItem = document.createElement('div'); reviewItem.classList.add('review-item'); const qText = q.question.replace(/^\d+[\.\-]\s*/, ''); let optionsHtml = ''; q.options.forEach((opt, optIndex) => { let style = 'padding:10px; margin-bottom:5px; border-radius:4px; font-family:Roboto; display:flex; gap:10px; text-align:left;'; let letterStyle = 'font-weight:bold; min-width:20px;'; if (optIndex === q.answer) style += 'background: #1b5e20; border: 1px solid #00e676; color:white;'; else if (optIndex === userAnswer && userAnswer !== q.answer) style += 'background: #b71c1c; border: 1px solid #ff1744; color:white;'; else style += 'background: #2c2c2c; color:#888; border: 1px solid #444;'; optionsHtml += `<div style="${style}"><span style="${letterStyle}">${letters[optIndex]}</span><span style="flex:1; word-wrap:break-word;">${opt}</span></div>`; }); reviewItem.innerHTML = `<div class="review-q-text">${index + 1}. ${qText}</div><div style="direction: ltr;">${optionsHtml}</div>`; reviewList.appendChild(reviewItem); }); const percentage = Math.round((score / questions.length) * 100); document.getElementById('score-text').innerText = percentage + "%"; document.getElementById('score-detail').innerText = `${score} / ${questions.length} Correct`; }
    function restartQuiz() { currentQuestionIndex = 0; score = 0; userAnswers = new Array(questions.length).fill(null); document.getElementById('quiz-screen').style.display = 'flex'; document.getElementById('result-screen').style.display = 'none'; loadQuestion(); }
    loadQuestion();
</script>
</body>
</html>
